<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Safe</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .safe {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }

    p {
      margin: 0 0 20px;
      text-align: center;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: white;
      font-size: 16px;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: rgba(34, 197, 94, 0.7);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #052e16;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.05); }

    .message {
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .message.error { color: var(--danger); }
    .message.success { color: #86efac; }

    .secret {
      display: none;
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .secret img {
      max-width: 100%;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 6px;
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <div class="safe">
    <h1 style="font-size:42px;font-weight:900;letter-spacing:2px;">CHAPTER ROOM</h1>
    <p style="font-size:20px;font-weight:700;margin-top:6px;">Digital Safe</p>
    <p>Enter the passcode to unlock the hidden picture.</p>

    <label for="passcode">Passcode</label>
    <input id="passcode" type="password" placeholder="Enter passcode" autocomplete="off" />
    <button id="unlockBtn">Unlock</button>

    <div id="message" class="message"></div>

    <div id="secret" class="secret">
      <img id="secretImage" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80" alt="Hidden picture" />
      <div class="hint">Change the image URL and passcode directly in the code.</div>
    </div>
  </div>

  <script>
    // CHANGE THESE TWO VALUES:
    const correctPasscode = "2135064137401238";
    const secretImageUrl = "https://ucf52dc3b16089a8df65301155d1.previews.dropboxusercontent.com/p/thumb/AC8xyvn6uqTP_OcJKmUjDcjcu6bMczqyguWgItuZTGIQwCEBun5YgQC5VI775IE4m8FBTrI8hn_4c_d3nlQW_hnKCF2ppTC9WF0mYif63f0QOj2Ih1ginmhNoDOftTta4TqYdq-wSBdbZcKbHqk2l28wgeVDkOtlK7sCzpPU05DWF5GyUKUPJkhhTIOTt4zJC89K1y5NMag9fYt9AO3wrvrxNSUw53OsydJFqooORplTgBPjDRRqcwWfp4d9OI_hKYLrYx45ZyS7sbsSIWQTzwOQOCyPaBgB9zxtUYDZb24P2GUQgveUSnTPgE5UsEt7wROUl1mGl_Lhqt94WT5xSNdl2zOH00M2PZOKAaRdJFg-TasY-ZGO6vDzxvhznMJT2hO8BUSq24tTayYiB1FjyKDIuB2JposnfSrfcopSHkXjtcZtjJlrxQ3iFHiB-7kBoQtHTqAQF2dWgeOpkCEhZ3G1/p.png?is_prewarmed=true";

    const passcodeInput = document.getElementById('passcode');
    const unlockBtn = document.getElementById('unlockBtn');
    const message = document.getElementById('message');
    const secret = document.getElementById('secret');
    const secretImage = document.getElementById('secretImage');

    secretImage.src = secretImageUrl;

    function unlockSafe() {
      const entered = passcodeInput.value;

      if (entered === correctPasscode) {
        message.textContent = 'Unlocked.';
        message.className = 'message success';
        secret.style.display = 'block';
      } else {
        message.textContent = 'Incorrect passcode.';
        message.className = 'message error';
        secret.style.display = 'none';
      }
    }

    unlockBtn.addEventListener('click', unlockSafe);
    passcodeInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') unlockSafe();
    });
  </script>
</body>
</html>
